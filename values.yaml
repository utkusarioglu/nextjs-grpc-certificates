# cert-manager:
#   namespace: api
serverCert:
  privateKey:
    algorithm: ECDSA
    size: 256

clientCert:
  privateKey:
    algorithm: ECDSA
    size: 256

subject:
  organizations:
    - nextjs-grpc

issuerRef:
  name: intermediate-ca
  kind: Issuer
  group: cert-manager.io

vaultIssuerRef:
  name: vault-issuer
  serverEndpoint: https://vault.vault:8200
  secretName: <TF_POPULATED>
  caBundle: <TF_POPULATED>
  mountPath: <TF_POPULATED>

defaultDuration: 24h
defaultRenewBefore: 1h

caNamespaces:
  - api
  - ms
  - observability

publicDomainName: <TF_POPULATED>
